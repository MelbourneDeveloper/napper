name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  validate-tag:
    name: Validate tag
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.parse.outputs.version }}
      tag: ${{ steps.parse.outputs.tag }}
    steps:
      - name: Parse and validate tag
        id: parse
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Tag '$TAG' does not match required format vMAJOR.MINOR.PATCH (e.g. v0.11.0)"
            exit 1
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing $TAG (version $VERSION)"

  build-cli:
    name: Build CLI ${{ matrix.rid }}
    needs: validate-tag
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: osx-arm64
            archive: tar.gz
            dtk-platform: darwin-arm64
          - rid: osx-x64
            archive: tar.gz
            dtk-platform: darwin-x64
          - rid: linux-x64
            archive: tar.gz
            dtk-platform: linux-x64
          - rid: linux-arm64
            archive: tar.gz
            dtk-platform: linux-arm64
          - rid: win-x64
            archive: zip
            dtk-platform: win32-x64
          - rid: win-arm64
            archive: zip
            dtk-platform: win32-arm64
    env:
      VERSION: ${{ needs.validate-tag.outputs.version }}
      TAG: ${{ needs.validate-tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Publish CLI (${{ matrix.rid }})
        shell: bash
        run: |
          dotnet publish src/Napper.Cli/Napper.Cli.fsproj \
            -r ${{ matrix.rid }} \
            --self-contained \
            -p:PublishTrimmed=true \
            -p:PublishSingleFile=true \
            -p:Version=$VERSION \
            -p:AssemblyVersion=$VERSION \
            -p:FileVersion=$VERSION \
            -p:InformationalVersion=$VERSION \
            -o out/${{ matrix.rid }} \
            --nologo

      - name: Verify binary version matches tag (Unix)
        if: matrix.rid == 'osx-arm64' || matrix.rid == 'osx-x64' || matrix.rid == 'linux-x64'
        shell: bash
        run: |
          chmod +x out/${{ matrix.rid }}/napper
          ACTUAL=$(out/${{ matrix.rid }}/napper --version)
          echo "Binary reports: $ACTUAL"
          EXPECTED="napper $VERSION"
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "::error::Binary version '$ACTUAL' does not match expected 'napper $VERSION'"
            exit 1
          fi
          # Verify --version --json output is valid JSON with correct fields
          JSON=$(out/${{ matrix.rid }}/napper --version --json)
          echo "JSON: $JSON"
          echo "$JSON" | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          assert d['name']=='napper', f'name mismatch: {d[\"name\"]}'
          assert d['version']=='$VERSION', f'version mismatch: {d[\"version\"]}'
          assert d['manifestVersion']==1, f'manifestVersion missing'
          assert d['kind']=='cli', f'kind mismatch: {d[\"kind\"]}'
          print('JSON version manifest: OK')
          "

      - name: Verify binary version is embedded (Windows .exe, scanned on Linux)
        if: matrix.rid == 'win-x64' || matrix.rid == 'win-arm64'
        shell: bash
        run: |
          # Cannot execute the Windows .exe on Linux. .NET embeds InformationalVersion
          # as a UTF-16LE string in the PE metadata. Scan for both ASCII and UTF-16LE.
          BIN=out/${{ matrix.rid }}/napper.exe
          test -s "$BIN"
          echo "napper.exe built ($(stat -c %s "$BIN") bytes)"
          if strings -a "$BIN" | grep -Fq "$VERSION"; then
            echo "Found version $VERSION in ASCII strings"
          elif strings -a -e l "$BIN" | grep -Fq "$VERSION"; then
            echo "Found version $VERSION in UTF-16LE strings"
          else
            echo "::error::Version $VERSION not found in $BIN metadata"
            exit 1
          fi

      - name: Stage raw binary asset
        shell: bash
        run: |
          mkdir -p assets
          if [[ "${{ matrix.rid }}" == win-* ]]; then
            cp out/${{ matrix.rid }}/napper.exe assets/napper-${{ matrix.rid }}.exe
          else
            cp out/${{ matrix.rid }}/napper assets/napper-${{ matrix.rid }}
            chmod +x assets/napper-${{ matrix.rid }}
          fi

      - name: Stage archive asset
        shell: bash
        run: |
          STAGE=$(mktemp -d)
          if [[ "${{ matrix.rid }}" == win-* ]]; then
            cp out/${{ matrix.rid }}/napper.exe "$STAGE/napper.exe"
            (cd "$STAGE" && zip -q -9 "$GITHUB_WORKSPACE/assets/napper-$TAG-${{ matrix.rid }}.zip" napper.exe)
          else
            cp out/${{ matrix.rid }}/napper "$STAGE/napper"
            chmod +x "$STAGE/napper"
            tar -C "$STAGE" -czf "assets/napper-$TAG-${{ matrix.rid }}.tar.gz" napper
          fi
          ls -la assets/

      - name: Upload release assets
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.rid }}
          path: assets/*
          if-no-files-found: error

      - name: Upload raw binary for VSIX bundling
        uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.dtk-platform }}
          path: |
            out/${{ matrix.rid }}/napper
            out/${{ matrix.rid }}/napper.exe
          if-no-files-found: warn

  build-vsix:
    name: Build VSIX (${{ matrix.dtk-platform }})
    needs: [validate-tag, build-cli]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - dtk-platform: darwin-arm64
            rid: osx-arm64
            os: macos-15
            vsce-target: darwin-arm64
            npm_config_arch: arm64
          - dtk-platform: darwin-x64
            rid: osx-x64
            os: macos-13
            vsce-target: darwin-x64
            npm_config_arch: x64
          - dtk-platform: linux-x64
            rid: linux-x64
            os: ubuntu-latest
            vsce-target: linux-x64
            npm_config_arch: x64
          - dtk-platform: linux-arm64
            rid: linux-arm64
            os: ubuntu-latest
            vsce-target: linux-arm64
            npm_config_arch: arm64
          - dtk-platform: win32-x64
            rid: win-x64
            os: windows-latest
            vsce-target: win32-x64
            npm_config_arch: x64
          - dtk-platform: win32-arm64
            rid: win-arm64
            os: windows-latest
            vsce-target: win32-arm64
            npm_config_arch: arm
    env:
      VERSION: ${{ needs.validate-tag.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/Napper.VsCode/package-lock.json

      - name: Download bundled binary
        uses: actions/download-artifact@v4
        with:
          name: bin-${{ matrix.dtk-platform }}
          path: bin-download/

      - name: Stage bundled binary into extension
        shell: bash
        run: |
          mkdir -p src/Napper.VsCode/bin/${{ matrix.dtk-platform }}
          if [[ "${{ matrix.dtk-platform }}" == win32-* ]]; then
            cp bin-download/napper.exe src/Napper.VsCode/bin/${{ matrix.dtk-platform }}/napper.exe
          else
            cp bin-download/napper src/Napper.VsCode/bin/${{ matrix.dtk-platform }}/napper
            chmod +x src/Napper.VsCode/bin/${{ matrix.dtk-platform }}/napper
          fi
          echo "Bundled binary:"
          ls -la src/Napper.VsCode/bin/${{ matrix.dtk-platform }}/

      - name: Verify manifest PRODUCT_VERSION matches tag
        shell: bash
        run: |
          # deployment-toolkit.json uses ${PRODUCT_VERSION} — verify manifest is present
          test -f src/Napper.VsCode/deployment-toolkit.json
          echo "deployment-toolkit.json present"
          cat src/Napper.VsCode/deployment-toolkit.json

      - name: Verify bundled binary version
        shell: bash
        run: |
          if [[ "${{ matrix.dtk-platform }}" != win32-* && "${{ matrix.dtk-platform }}" != "linux-arm64" ]]; then
            BIN=src/Napper.VsCode/bin/${{ matrix.dtk-platform }}/napper
            ACTUAL=$($BIN --version)
            EXPECTED="napper $VERSION"
            echo "Bundled binary reports: $ACTUAL"
            if [ "$ACTUAL" != "$EXPECTED" ]; then
              echo "::error::Bundled binary version '$ACTUAL' != expected '$EXPECTED'"
              exit 1
            fi
            echo "Bundled binary version: OK"
          fi

      - name: Set extension version from tag
        working-directory: src/Napper.VsCode
        run: npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Install extension dependencies
        working-directory: src/Napper.VsCode
        run: npm ci
        env:
          npm_config_arch: ${{ matrix.npm_config_arch }}

      - name: Compile extension
        working-directory: src/Napper.VsCode
        run: npx webpack --mode production

      - name: Package per-platform VSIX
        working-directory: src/Napper.VsCode
        run: npx @vscode/vsce package --no-dependencies --skip-license --target ${{ matrix.vsce-target }}

      - name: Verify VSIX contains bundled binary and manifest
        shell: bash
        run: |
          VSIX=$(ls src/Napper.VsCode/*.vsix | head -1)
          echo "VSIX: $VSIX"
          # VSIX is a ZIP — list contents
          unzip -l "$VSIX" > vsix-contents.txt
          cat vsix-contents.txt
          # Must contain deployment-toolkit.json
          grep -q "deployment-toolkit.json" vsix-contents.txt || { echo "::error::deployment-toolkit.json missing from VSIX"; exit 1; }
          # Must contain the bundled binary — see [SWR-VSIX-VERIFY]
          if [[ "${{ matrix.dtk-platform }}" == win32-* ]]; then
            grep -q "bin/${{ matrix.dtk-platform }}/napper.exe" vsix-contents.txt || { echo "::error::bundled napper.exe missing from VSIX"; exit 1; }
          else
            grep -q "bin/${{ matrix.dtk-platform }}/napper" vsix-contents.txt || { echo "::error::bundled napper missing from VSIX"; exit 1; }
          fi
          echo "VSIX content verification: OK"

      - name: Stage VSIX into assets
        shell: bash
        run: |
          mkdir -p assets
          cp src/Napper.VsCode/*.vsix assets/

      - uses: actions/upload-artifact@v4
        with:
          name: vsix-${{ matrix.dtk-platform }}
          path: assets/*.vsix
          if-no-files-found: error

  publish-marketplace:
    name: Publish to VS Code Marketplace
    needs: [validate-tag, build-vsix]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Download all per-platform VSIXes
        uses: actions/download-artifact@v4
        with:
          path: vsix-artifacts
          pattern: vsix-*
          merge-multiple: true

      - name: Publish all platforms to VS Code Marketplace
        run: npx @vscode/vsce publish --packagePath $(find vsix-artifacts -name '*.vsix' | tr '\n' ' ')
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

  publish-nuget:
    name: Publish to NuGet
    needs: validate-tag
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      VERSION: ${{ needs.validate-tag.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Pack dotnet tool
        run: |
          dotnet pack src/Napper.Cli/Napper.Cli.fsproj \
            -c Release \
            -p:Version=$VERSION \
            --nologo

      - name: Push to NuGet
        run: |
          dotnet nuget push src/Napper.Cli/nupkg/napper.${VERSION}.nupkg \
            --api-key ${{ secrets.NIMBLESITE_NUGET_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

  release:
    name: Create GitHub Release
    needs: [validate-tag, build-cli, build-vsix, publish-nuget, publish-marketplace]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TAG: ${{ needs.validate-tag.outputs.tag }}
    steps:
      - name: Download CLI release assets
        uses: actions/download-artifact@v4
        with:
          path: assets
          pattern: cli-*
          merge-multiple: true

      - name: Download per-platform VSIXs
        uses: actions/download-artifact@v4
        with:
          path: assets
          pattern: vsix-*
          merge-multiple: true

      - name: Generate SHA256 checksums
        working-directory: assets
        shell: bash
        run: |
          ls -la
          sha256sum * > ../checksums-sha256.txt
          cat ../checksums-sha256.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          files: |
            assets/*
            checksums-sha256.txt
          generate_release_notes: true
          draft: false
          prerelease: false

  update-homebrew:
    name: Update Homebrew Formula
    needs: [validate-tag, release]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TAG: ${{ needs.validate-tag.outputs.tag }}
      VERSION: ${{ needs.validate-tag.outputs.version }}
    steps:
      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: Nimblesite/homebrew-tap
          token: ${{ secrets.BREW_SCOOP_PAT }}

      - name: Download release archives and compute SHA256s
        shell: bash
        run: |
          BASE="https://github.com/Nimblesite/napper/releases/download/${TAG}"
          curl -fsSL -o macos-arm64.tar.gz "${BASE}/napper-${TAG}-osx-arm64.tar.gz"
          curl -fsSL -o macos-x64.tar.gz   "${BASE}/napper-${TAG}-osx-x64.tar.gz"
          curl -fsSL -o linux-x64.tar.gz   "${BASE}/napper-${TAG}-linux-x64.tar.gz"
          {
            echo "SHA256_MACOS_ARM64=$(sha256sum macos-arm64.tar.gz | cut -d ' ' -f 1)"
            echo "SHA256_MACOS_X64=$(sha256sum macos-x64.tar.gz | cut -d ' ' -f 1)"
            echo "SHA256_LINUX_X64=$(sha256sum linux-x64.tar.gz | cut -d ' ' -f 1)"
          } >> "$GITHUB_ENV"

      - name: Write formula
        shell: bash
        run: |
          mkdir -p Formula
          cat > Formula/napper.rb <<FORMULA
          # typed: false
          # frozen_string_literal: true

          class Napper < Formula
            desc "CLI-first, test-oriented HTTP API testing tool. Send requests, run assertions, manage environments."
            homepage "https://napperapi.dev"
            license "MIT"
            version "${VERSION}"

            on_macos do
              on_arm do
                url "https://github.com/Nimblesite/napper/releases/download/${TAG}/napper-${TAG}-osx-arm64.tar.gz"
                sha256 "${SHA256_MACOS_ARM64}"
              end
              on_intel do
                url "https://github.com/Nimblesite/napper/releases/download/${TAG}/napper-${TAG}-osx-x64.tar.gz"
                sha256 "${SHA256_MACOS_X64}"
              end
            end

            on_linux do
              on_intel do
                url "https://github.com/Nimblesite/napper/releases/download/${TAG}/napper-${TAG}-linux-x64.tar.gz"
                sha256 "${SHA256_LINUX_X64}"
              end
            end

            def install
              bin.install "napper"
            end

            test do
              assert_match version.to_s, shell_output("\#{bin}/napper --version")
            end
          end
          FORMULA
          cat Formula/napper.rb

      - name: Commit and push
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/napper.rb
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Update napper to ${TAG}"
          git push

  update-scoop:
    name: Update Scoop Manifest
    needs: [validate-tag, release]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TAG: ${{ needs.validate-tag.outputs.tag }}
      VERSION: ${{ needs.validate-tag.outputs.version }}
    steps:
      - name: Checkout scoop-bucket
        uses: actions/checkout@v4
        with:
          repository: Nimblesite/scoop-bucket
          token: ${{ secrets.BREW_SCOOP_PAT }}

      - name: Download release asset and compute SHA256
        shell: bash
        run: |
          ASSET_URL="https://github.com/Nimblesite/napper/releases/download/${TAG}/napper-${TAG}-win-x64.zip"
          curl -fsSL -o napper.zip "$ASSET_URL"
          {
            echo "SHA256=$(sha256sum napper.zip | cut -d ' ' -f 1)"
            echo "ASSET_URL=$ASSET_URL"
          } >> "$GITHUB_ENV"

      - name: Write manifest
        shell: bash
        run: |
          mkdir -p bucket
          jq -n \
            --arg version "$VERSION" \
            --arg url "$ASSET_URL" \
            --arg hash "$SHA256" \
            '{
              version: $version,
              description: "CLI-first, test-oriented HTTP API testing tool. Send requests, run assertions, manage environments.",
              homepage: "https://napperapi.dev",
              license: "MIT",
              architecture: {
                "64bit": {
                  url: $url,
                  hash: $hash,
                  bin: "napper.exe"
                }
              },
              checkver: {
                github: "https://github.com/Nimblesite/napper"
              },
              autoupdate: {
                architecture: {
                  "64bit": {
                    url: "https://github.com/Nimblesite/napper/releases/download/v$version/napper-v$version-win-x64.zip"
                  }
                }
              }
            }' > bucket/napper.json

      - name: Commit and push
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bucket/napper.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Update napper to ${TAG}"
          git push

  deploy-website:
    name: Deploy Website
    needs: [validate-tag, update-homebrew, update-scoop]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      actions: write
    steps:
      - name: Trigger Pages deploy
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run deploy-pages.yml \
            --repo ${{ github.repository }} \
            --ref main
